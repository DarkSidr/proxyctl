name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  SINGBOX_VERSION: v1.13.4
  SINGBOX_TAGS: with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_v2ray_api,with_gvisor

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential gcc-aarch64-linux-gnu

      - name: Run tests
        run: go test ./...

      - name: Build proxyctl
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w -X proxyctl/internal/cli.Version=${VERSION}" \
            -o dist/proxyctl-linux-amd64 ./cmd/proxyctl
          dist/proxyctl-linux-amd64 init --db /tmp/proxyctl.db
          sha256sum dist/proxyctl-linux-amd64 > dist/proxyctl-linux-amd64.sha256

      - name: Clone sing-box ${{ env.SINGBOX_VERSION }}
        run: |
          git clone --depth 1 --branch ${{ env.SINGBOX_VERSION }} \
            https://github.com/SagerNet/sing-box.git /tmp/sing-box

      - name: Build sing-box amd64
        working-directory: /tmp/sing-box
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -tags "${{ env.SINGBOX_TAGS }}" \
            -o "$GITHUB_WORKSPACE/dist/sing-box-linux-amd64" ./cmd/sing-box
          sha256sum -b "$GITHUB_WORKSPACE/dist/sing-box-linux-amd64" \
            | sed "s|$GITHUB_WORKSPACE/dist/||" \
            > "$GITHUB_WORKSPACE/dist/sing-box-linux-amd64.sha256"

      - name: Build sing-box arm64
        working-directory: /tmp/sing-box
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -tags "${{ env.SINGBOX_TAGS }}" \
            -o "$GITHUB_WORKSPACE/dist/sing-box-linux-arm64" ./cmd/sing-box
          sha256sum -b "$GITHUB_WORKSPACE/dist/sing-box-linux-arm64" \
            | sed "s|$GITHUB_WORKSPACE/dist/||" \
            > "$GITHUB_WORKSPACE/dist/sing-box-linux-arm64.sha256"

      - name: Verify sing-box has with_v2ray_api
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x dist/sing-box-linux-amd64
          dist/sing-box-linux-amd64 version
          dist/sing-box-linux-amd64 version | grep -q "with_v2ray_api" || \
            { echo "ERROR: with_v2ray_api tag missing from sing-box build!"; exit 1; }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/proxyctl-linux-amd64
            dist/proxyctl-linux-amd64.sha256
            dist/sing-box-linux-amd64
            dist/sing-box-linux-amd64.sha256
            dist/sing-box-linux-arm64
            dist/sing-box-linux-arm64.sha256
          generate_release_notes: true
