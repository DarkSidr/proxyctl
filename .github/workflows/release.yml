name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Run tests
        run: go test ./...

      - name: Build release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w -X proxyctl/internal/cli.Version=${VERSION}" \
            -o dist/proxyctl-linux-amd64 ./cmd/proxyctl
          dist/proxyctl-linux-amd64 init --db /tmp/proxyctl.db
          sha256sum dist/proxyctl-linux-amd64 > dist/proxyctl-linux-amd64.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/proxyctl-linux-amd64
            dist/proxyctl-linux-amd64.sha256
          generate_release_notes: true
