events {}

http {
  server {
    listen 80;
    server_name _;

    root /etc/proxy-orchestrator/runtime/decoy-site;
    index index.html;

    location ~ ^/sub/([A-Za-z0-9_-]+)$ {
      default_type text/plain;
      root /var/lib/proxy-orchestrator/subscriptions/public;
      try_files /$1 /$1.txt =404;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
