<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account Login</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main class="shell">
    <section class="card">
      <h1>Member Login</h1>
      <p class="subtitle">Use your account credentials to continue.</p>
      <form id="login-form" class="form" autocomplete="off">
        <label>Email</label>
        <input type="email" name="email" placeholder="name@example.com" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
      </form>
      <p id="error" class="error" role="alert" aria-live="polite"></p>
    </section>
  </main>
  <script>
    const form = document.getElementById("login-form");
    const error = document.getElementById("error");
    form.addEventListener("submit", function (event) {
      event.preventDefault();
      error.textContent = "The credentials are invalid. Please check your email and password.";
    });
  </script>
</body>
</html>
